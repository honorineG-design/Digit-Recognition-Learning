{% extends "base.html" %}
{% block title %}Sign In - DigitLearn{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5">
                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
        </div>
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue your learning journey</p>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username or email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('signup') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
