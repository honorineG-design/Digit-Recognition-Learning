{% extends "base.html" %}
{% block title %}Reset Password - DigitLearn{% endblock %}
{% block content %}
<div class="reset-container">
    <div class="reset-card">
        <div class="auth-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d29922" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <h1>Forgot Password</h1>
        <p class="reset-subtitle">Enter your email address and we'll help you recover your account.</p>
        <form method="POST" class="reset-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('login') }}">Back to sign in</a></p>
    </div>
</div>
{% endblock %}
