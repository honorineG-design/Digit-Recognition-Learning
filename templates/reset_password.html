{% extends "base.html" %}
{% block title %}Reset Password - DigitLearn{% endblock %}
{% block content %}
<div class="reset-container">
    <div class="reset-card">
        <div class="auth-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <h1>Reset Password</h1>
        <p class="reset-subtitle">Choose a new password for your account.</p>
        <form method="POST" class="reset-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" minlength="4" placeholder="At least 4 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
        </form>
        <p class="auth-footer"><a href="{{ url_for('login') }}">Back to sign in</a></p>
    </div>
</div>
{% endblock %}
